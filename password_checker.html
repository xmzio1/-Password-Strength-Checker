<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Password Strength Checker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, "Segoe UI", Tahoma, sans-serif;
    background: #f4f4f8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  h1 {
    font-size: 1.3rem;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 1.5rem;
  }

  /* Input row */
  .input-row {
    position: relative;
    margin-bottom: 1rem;
  }

  .input-row input {
    width: 100%;
    padding: 12px 48px 12px 14px;
    font-size: 16px;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    outline: none;
    transition: border-color .2s;
    color: #1a1a2e;
    background: #fafafa;
  }

  .input-row input:focus {
    border-color: #6c63ff;
    background: #fff;
  }

  .toggle-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #888;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .toggle-btn:hover { color: #333; }

  /* Meter */
  .meter-track {
    height: 8px;
    border-radius: 4px;
    background: #eee;
    overflow: hidden;
    margin-bottom: 1rem;
  }

  .meter-fill {
    height: 100%;
    width: 0;
    border-radius: 4px;
    transition: width .3s ease, background .3s ease;
  }

  /* Badges row */
  .badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    padding: 5px 10px;
    border-radius: 8px;
    border: 1px solid #e0e0e0;
    background: #f7f7f7;
    color: #555;
    font-weight: 500;
  }

  .badge svg { flex-shrink: 0; }

  .badge.weak   { background: #fff0f0; border-color: #f5a0a0; color: #b03030; }
  .badge.medium { background: #fffbf0; border-color: #f5cc80; color: #9a6200; }
  .badge.strong { background: #f0fff4; border-color: #80d8a0; color: #1a7a40; }
  .badge.vstrong{ background: #f0faff; border-color: #80cce8; color: #1060a0; }

  /* Section labels */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #aaa;
    margin-bottom: 8px;
  }

  /* Issues */
  .item-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 1.25rem;
  }

  .issue-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 14px;
    color: #c0392b;
  }

  .issue-item svg { flex-shrink: 0; margin-top: 1px; }

  /* Suggestions */
  .sugg-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 14px;
    color: #555;
  }

  .sugg-item svg { flex-shrink: 0; margin-top: 1px; color: #6c63ff; }

  .ok-msg {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #1a7a40;
    margin-bottom: 1.25rem;
    font-weight: 500;
  }

  .empty-msg {
    font-size: 14px;
    color: #bbb;
    margin-bottom: 1rem;
  }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid #f0f0f0;
    margin: 1rem 0;
  }
</style>
</head>
<body>

<div class="card">
  <h1>🔐 Password Strength Checker</h1>

  <div class="input-row">
    <input type="password" id="pw" placeholder="Enter a password…" autocomplete="new-password" />
    <button class="toggle-btn" id="toggleBtn" title="Show / hide password" aria-label="Toggle password visibility">
      <!-- Eye icon -->
      <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>

  <div class="meter-track"><div class="meter-fill" id="bar"></div></div>

  <div class="badges">
    <span class="badge" id="strengthBadge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <span id="strengthText">Strength: —</span>
    </span>
    <span class="badge" id="entropyBadge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/>
      </svg>
      <span id="entropyText">Entropy: —</span>
    </span>
    <span class="badge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12h18M3 6h18M3 18h18"/>
      </svg>
      <span id="lengthText">Length: —</span>
    </span>
  </div>

  <div id="issueSection">
    <p class="empty-msg">Start typing to see feedback…</p>
  </div>

  <div id="suggSection"></div>
</div>

<script>
const pwInput      = document.getElementById('pw');
const bar          = document.getElementById('bar');
const strengthBadge= document.getElementById('strengthBadge');
const strengthText = document.getElementById('strengthText');
const entropyText  = document.getElementById('entropyText');
const lengthText   = document.getElementById('lengthText');
const issueSection = document.getElementById('issueSection');
const suggSection  = document.getElementById('suggSection');
const toggleBtn    = document.getElementById('toggleBtn');
const eyeIcon      = document.getElementById('eyeIcon');

/* ── Toggle show/hide ── */
toggleBtn.addEventListener('click', () => {
  const hidden = pwInput.type === 'password';
  pwInput.type = hidden ? 'text' : 'password';
  eyeIcon.innerHTML = hidden
    ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8
         a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4
         c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07
         a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
       <circle cx="12" cy="12" r="3"/>`;
});

/* ── Helpers ── */
function charPool(pw) {
  let s = 0;
  if (/[a-z]/.test(pw)) s += 26;
  if (/[A-Z]/.test(pw)) s += 26;
  if (/[0-9]/.test(pw)) s += 10;
  if (/[^a-zA-Z0-9]/.test(pw)) s += 32;
  return s;
}
function entropy(pw) {
  const p = charPool(pw);
  return p > 0 ? pw.length * Math.log2(p) : 0;
}
function repeatedScore(pw) {
  return (/(.)\1\1/.test(pw) || /(.{2,})\1/.test(pw)) ? 2 : 0;
}
function keyboardScore(pw) {
  for (const p of ['qwerty','asdf','zxcv','12345','password','qaz','wsx'])
    if (pw.toLowerCase().includes(p)) return 3;
  return 0;
}

/* ── Analysis ── */
function analyze(pw) {
  const ent = entropy(pw);
  const len = pw.length;
  let score = 0;
  const issues = [];

  if (len >= 8) score++; else issues.push("Fewer than 8 characters.");
  if (/[a-z]/.test(pw)) score++; else issues.push("No lowercase letters (a–z).");
  if (/[A-Z]/.test(pw)) score++; else issues.push("No uppercase letters (A–Z).");
  if (/[0-9]/.test(pw)) score++; else issues.push("No digits (0–9).");
  if (/[^a-zA-Z0-9]/.test(pw)) score++; else issues.push("No symbols or punctuation.");

  const rep = repeatedScore(pw);
  const key = keyboardScore(pw);
  score -= (rep + key);
  if (rep) issues.push("Repeated characters or pattern found.");
  if (key) issues.push("Common keyboard pattern detected.");

  let strength = 'Weak';
  if      (ent >= 60 && score >= 3) strength = 'Very strong';
  else if (ent >= 45 && score >= 1) strength = 'Strong';
  else if (ent >= 28)               strength = 'Medium';

  const pct = Math.min(100, Math.max(4, Math.round((ent / 80) * 100)));
  return { ent: Math.round(ent * 10) / 10, strength, pct, issues, len };
}

/* ── Color maps ── */
const meterColor  = { Weak:'#e24b4a', Medium:'#ef9f27', Strong:'#639922', 'Very strong':'#1d9e75' };
const badgeClass  = { Weak:'weak',    Medium:'medium',  Strong:'strong',  'Very strong':'vstrong'  };

const SUGGESTIONS = [
  "Aim for 12 or more characters.",
  "Try a passphrase: three random words plus symbols (e.g. Coffee-River-42!).",
  "Never reuse this password on other sites.",
  "Consider a password manager to generate and store unique passwords."
];

/* ── SVG icons (inline, reusable) ── */
const iconWarn = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
  <line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;

const iconBulb = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"
  stroke="#6c63ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M9 18h6M10 22h4M12 2a7 7 0 0 1 7 7c0 3.87-2.13 5.97-3 7H8
  c-.87-1.03-3-3.13-3-7a7 7 0 0 1 7-7z"/></svg>`;

const iconOk = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a7a40"
  stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <path d="M20 6L9 17l-5-5"/></svg>`;

/* ── Main listener ── */
pwInput.addEventListener('input', () => {
  const v = pwInput.value;

  if (!v) {
    bar.style.width = '0';
    strengthText.textContent = 'Strength: —';
    entropyText.textContent  = 'Entropy: —';
    lengthText.textContent   = 'Length: —';
    strengthBadge.className  = 'badge';
    issueSection.innerHTML   = '<p class="empty-msg">Start typing to see feedback…</p>';
    suggSection.innerHTML    = '';
    return;
  }

  const r = analyze(v);

  /* Meter */
  bar.style.width      = r.pct + '%';
  bar.style.background = meterColor[r.strength];

  /* Badges */
  strengthText.textContent = 'Strength: ' + r.strength;
  entropyText.textContent  = 'Entropy: ' + r.ent + ' bits';
  lengthText.textContent   = 'Length: ' + r.len;
  strengthBadge.className  = 'badge ' + badgeClass[r.strength];

  /* Issues */
  let issueHTML = '';
  if (r.issues.length) {
    issueHTML = '<p class="section-label">Issues</p><ul class="item-list">';
    for (const it of r.issues)
      issueHTML += `<li class="issue-item">${iconWarn}${it}</li>`;
    issueHTML += '</ul>';
  } else {
    issueHTML = `<div class="ok-msg">${iconOk} No major issues found.</div>`;
  }
  issueSection.innerHTML = issueHTML;

  /* Suggestions */
  let suggHTML = '<hr class="divider"><p class="section-label">Suggestions</p><ul class="item-list">';
  for (const s of SUGGESTIONS)
    suggHTML += `<li class="sugg-item">${iconBulb}${s}</li>`;
  suggHTML += '</ul>';
  suggSection.innerHTML = suggHTML;
});
</script>
</body>
</html>
